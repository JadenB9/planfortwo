<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="venBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f4f7f4"/>
      <stop offset="100%" stop-color="#fdf8f6"/>
    </linearGradient>
    <linearGradient id="venWall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fefdfb"/>
      <stop offset="100%" stop-color="#f9ede7"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="12" fill="url(#venBg)"/>
  <!-- ground -->
  <rect x="0" y="240" width="400" height="60" rx="0" fill="#c9d7ca" opacity="0.2"/>
  <!-- building -->
  <rect x="100" y="100" width="200" height="140" rx="4" fill="url(#venWall)" stroke="#e9bea5" stroke-width="1"/>
  <!-- roof -->
  <polygon points="90,100 200,40 310,100" fill="#fefdfb" stroke="#c2674a" stroke-width="1.5" opacity="0.8"/>
  <!-- door -->
  <rect x="175" y="170" width="50" height="70" rx="25" fill="none" stroke="#c2674a" stroke-width="1.5" opacity="0.5"/>
  <circle cx="218" cy="205" r="2" fill="#c2674a" opacity="0.4"/>
  <!-- windows -->
  <rect x="120" y="130" width="30" height="35" rx="3" fill="none" stroke="#5a7d5d" stroke-width="1" opacity="0.4"/>
  <line x1="135" y1="130" x2="135" y2="165" stroke="#5a7d5d" stroke-width="0.5" opacity="0.3"/>
  <rect x="250" y="130" width="30" height="35" rx="3" fill="none" stroke="#5a7d5d" stroke-width="1" opacity="0.4"/>
  <line x1="265" y1="130" x2="265" y2="165" stroke="#5a7d5d" stroke-width="0.5" opacity="0.3"/>
  <!-- trees -->
  <circle cx="60" cy="190" r="25" fill="#a3baa5" opacity="0.35"/>
  <rect x="57" y="215" width="6" height="25" rx="2" fill="#7a9a7d" opacity="0.3"/>
  <circle cx="340" cy="190" r="25" fill="#a3baa5" opacity="0.35"/>
  <rect x="337" y="215" width="6" height="25" rx="2" fill="#7a9a7d" opacity="0.3"/>
  <!-- path -->
  <path d="M175 240 Q190 255 200 270 Q210 255 225 240" fill="none" stroke="#e9bea5" stroke-width="1.5" opacity="0.4"/>
</svg>
