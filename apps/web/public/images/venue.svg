<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f7f4f0"/>
      <stop offset="60%" stop-color="#faf6f2"/>
      <stop offset="100%" stop-color="#fdf9f5"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8efe9"/>
      <stop offset="100%" stop-color="#d4dfd5"/>
    </linearGradient>
    <linearGradient id="columnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5ede7"/>
      <stop offset="30%" stop-color="#faf6f2"/>
      <stop offset="70%" stop-color="#f5ede7"/>
      <stop offset="100%" stop-color="#efe3da"/>
    </linearGradient>
    <linearGradient id="archGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#f5ede7"/>
      <stop offset="100%" stop-color="#faf6f2"/>
    </linearGradient>
    <linearGradient id="pathGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e5d5c8"/>
      <stop offset="100%" stop-color="#dbc9ba"/>
    </linearGradient>
    <linearGradient id="curtainLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0e6de" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f0e6de" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="curtainRight" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#f0e6de" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f0e6de" stop-opacity="0.2"/>
    </linearGradient>
    <clipPath id="roundedFrame">
      <rect width="400" height="300" rx="12"/>
    </clipPath>
  </defs>

