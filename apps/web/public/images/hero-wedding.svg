<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf8f6"/>
      <stop offset="35%" stop-color="#f9ede7"/>
      <stop offset="65%" stop-color="#f4f7f4"/>
      <stop offset="100%" stop-color="#fefdfb"/>
    </linearGradient>
    <linearGradient id="heroAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c2674a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#5a7d5d" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="40%">
      <stop offset="0%" stop-color="#e9bea5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e9bea5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="60%">
      <stop offset="0%" stop-color="#a3baa5" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#a3baa5" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#c2674a" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="1200" height="600" fill="url(#heroBg)"/>
  <rect width="1200" height="600" fill="url(#dots)"/>
  <ellipse cx="350" cy="300" rx="300" ry="280" fill="url(#glow1)"/>
  <ellipse cx="850" cy="300" rx="280" ry="260" fill="url(#glow2)"/>
  <rect width="1200" height="600" fill="url(#heroAccent)"/>
  <!-- decorative arcs -->
  <path d="M0 450 Q300 350 600 420 Q900 490 1200 380" fill="none" stroke="#c2674a" stroke-width="1" opacity="0.12"/>
  <path d="M0 480 Q300 380 600 450 Q900 520 1200 410" fill="none" stroke="#5a7d5d" stroke-width="1" opacity="0.1"/>
  <!-- ring motif center -->
  <circle cx="560" cy="300" r="60" fill="none" stroke="#c2674a" stroke-width="2" opacity="0.15"/>
  <circle cx="640" cy="300" r="60" fill="none" stroke="#5a7d5d" stroke-width="2" opacity="0.15"/>
  <!-- subtle floral corners -->
  <circle cx="80" cy="80" r="40" fill="none" stroke="#e9bea5" stroke-width="1" opacity="0.2"/>
  <circle cx="80" cy="80" r="25" fill="none" stroke="#c9d7ca" stroke-width="1" opacity="0.15"/>
  <circle cx="1120" cy="520" r="40" fill="none" stroke="#e9bea5" stroke-width="1" opacity="0.2"/>
  <circle cx="1120" cy="520" r="25" fill="none" stroke="#c9d7ca" stroke-width="1" opacity="0.15"/>
</svg>
