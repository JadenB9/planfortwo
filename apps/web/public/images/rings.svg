<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="rBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf8f6"/>
      <stop offset="100%" stop-color="#fefdfb"/>
    </linearGradient>
    <linearGradient id="rGold1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c2674a"/>
      <stop offset="50%" stop-color="#d07d56"/>
      <stop offset="100%" stop-color="#e5b96e"/>
    </linearGradient>
    <linearGradient id="rGold2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e5b96e"/>
      <stop offset="50%" stop-color="#dca050"/>
      <stop offset="100%" stop-color="#c2674a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="12" fill="url(#rBg)"/>
  <!-- soft glow -->
  <ellipse cx="200" cy="150" rx="100" ry="90" fill="#e9bea5" opacity="0.12"/>
  <!-- ring 1 -->
  <ellipse cx="170" cy="155" rx="55" ry="50" fill="none" stroke="url(#rGold1)" stroke-width="6" opacity="0.7"/>
  <ellipse cx="170" cy="155" rx="55" ry="50" fill="none" stroke="#fefdfb" stroke-width="1.5" opacity="0.3"/>
  <!-- ring 2 -->
  <ellipse cx="230" cy="155" rx="55" ry="50" fill="none" stroke="url(#rGold2)" stroke-width="6" opacity="0.7"/>
  <ellipse cx="230" cy="155" rx="55" ry="50" fill="none" stroke="#fefdfb" stroke-width="1.5" opacity="0.3"/>
  <!-- diamond -->
  <polygon points="200,85 210,100 200,115 190,100" fill="#e5b96e" opacity="0.5"/>
  <polygon points="200,85 210,100 200,95 190,100" fill="#eed09a" opacity="0.6"/>
  <!-- sparkles -->
  <circle cx="145" cy="100" r="2" fill="#e5b96e" opacity="0.4"/>
  <circle cx="260" cy="110" r="1.5" fill="#e5b96e" opacity="0.3"/>
  <circle cx="200" cy="210" r="1.5" fill="#e5b96e" opacity="0.35"/>
</svg>
